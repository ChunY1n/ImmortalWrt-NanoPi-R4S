name: Build ImmortalWrt for R4S 1G
on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 4' # 每周四 UTC 20:00 (北京时间每周五凌晨 4:00) 自动触发编译

permissions:
  contents: write   # 自动创建 Release 需要写权限

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  # 锁定稳定分支而非 master 开发分支，编译更稳定，减少不必要的包体积
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  FIRMWARE_PATH: openwrt/bin/targets/rockchip/armv8

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        echo "清理前磁盘占用："
        df -hT $PWD
        # /opt/hostedtoolcache 通常是占用最大的一块（10GB+），之前漏清理是
        # 导致 "No space left on device" 编译失败的主要原因
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/local/share/powershell /usr/share/swift /frameworks
        sudo rm -rf /usr/local/share/boost /usr/local/graalvm* /usr/local/.ghcup
        sudo rm -rf /usr/lib/jvm /usr/local/julia*
        sudo docker image prune --all --force 2>/dev/null || true
        sudo apt-get clean
        echo "清理后磁盘占用："
        df -hT $PWD

    - name: Increase swap space
      run: |
        # 编译内核/gnutls 等包在并发编译时内存压力较大，加 swap 防止 OOM
        AVAIL_GB=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
        SWAP_GB=$(( AVAIL_GB / 4 > 8 ? 8 : AVAIL_GB / 4 ))
        [ "$SWAP_GB" -lt 1 ] && SWAP_GB=1
        echo "分配 ${SWAP_GB}G swap"
        sudo swapoff -a
        sudo fallocate -l ${SWAP_GB}G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip xz-utils zlib1g-dev lib32gcc-s1 python3-pyelftools

        # 用 sudo -E 保持和 make 一致的执行环境安装，避免 --user 安装的包
        # 在 sudo make 时因 PATH 不同而读不到
        sudo -E pip3 install --upgrade pyelftools

        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Cache downloaded packages (dl)
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-packages-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.git/HEAD') }}
        restore-keys: |
          dl-packages-${{ env.REPO_BRANCH }}-

    - name: Load custom feeds & scripts
      run: |
        [ -e $DIY_P1_SH ] && chmod +x $DIY_P1_SH && ./$DIY_P1_SH
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cd ..
        [ -e $DIY_P2_SH ] && chmod +x $DIY_P2_SH && ./$DIY_P2_SH

    - name: Generate Configuration
      run: |
        # 校验种子配置文件是否存在，避免文件名写错（如误传 config.txt）导致
        # 静默跳过、最终用官方默认配置编译出一份"缺胳膊少腿"的固件
        if [ -e "$CONFIG_FILE" ]; then
          mv "$CONFIG_FILE" openwrt/.config
        else
          echo "::warning::未在仓库根目录找到 $CONFIG_FILE，将使用 OpenWrt 官方默认配置编译！"
        fi

        cd openwrt
        make defconfig

        echo "== 分区大小确认 =="
        grep -E "CONFIG_TARGET_(KERNEL|ROOTFS)_PARTSIZE" .config \
          || echo "::warning::未找到 PARTSIZE 设置，rootfs 分区将使用默认大小，之前 out of space 报错可能复现"

        echo "== 关键自定义软件包确认 =="
        for pkg in luci-app-passwall luci-app-homeproxy luci-app-dockerman luci-app-diskman; do
          if grep -q "^CONFIG_PACKAGE_${pkg}=y" .config; then
            echo "✔ ${pkg} 已选中"
          else
            echo "::warning::${pkg} 未在 .config 中选中，自定义配置可能未生效"
          fi
        done

        echo "== 后台管理 IP 确认 =="
        if grep -q "10.0.0.1" package/base-files/files/bin/config_generate; then
          echo "✔ 默认管理 IP 已改为 10.0.0.1"
        else
          echo "::warning::未检测到 10.0.0.1，diy-part2.sh 可能未正确修改 config_generate"
        fi

    - name: Download packages
      working-directory: ./openwrt
      run: |
        # 体积检查只扫描 dl/ 顶层（-maxdepth 1），避免误伤 go-mod-cache 等
        # 子目录里天然存在的大量正常小文件
        for i in 1 2 3; do
          make download -j8 && break
          echo "第 $i 次下载未完全成功，清理可疑文件后重试..."
          find dl -maxdepth 1 -type f -size -1024c -exec rm -f {} \;
          sleep 10
        done
        make download -j1

        BAD_FILES=$(find dl -maxdepth 1 -type f -size -1024c)
        if [ -n "$BAD_FILES" ]; then
          echo "::warning::以下文件体积异常（<1KB），可能下载不完整，正在清理重试："
          echo "$BAD_FILES"
          echo "$BAD_FILES" | xargs -r rm -f
          make download -j1
          STILL_BAD=$(find dl -maxdepth 1 -type f -size -1024c)
          if [ -n "$STILL_BAD" ]; then
            echo "::error::以下文件多次尝试后仍然异常，请检查网络或上游源是否失效："
            echo "$STILL_BAD"
            exit 1
          fi
        fi
        echo "所有包下载完整"

    - name: Compile the firmware
      run: |
        df -hT $PWD
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize firmware files
      id: organize
      run: |
        cd $FIRMWARE_PATH
        mkdir -p /tmp/firmware
        # 只挑固件相关文件，避免把 buildinfo/manifest 等杂项也塞进 Release
        cp -f *.img.gz /tmp/firmware/ 2>/dev/null || true
        cp -f *.manifest /tmp/firmware/ 2>/dev/null || true
        ls -lh /tmp/firmware

    - name: Generate release info
      id: release_info
      run: |
        echo "tag=$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
        echo "date=$(date '+%Y-%m-%d %H:%M %Z')" >> $GITHUB_OUTPUT

    - name: Upload firmware to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt_R4S_1G
        path: /tmp/firmware/*
        retention-days: 7

    - name: Delete older releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_info.outputs.tag }}
        name: "ImmortalWrt R4S 固件 ${{ steps.release_info.outputs.date }}"
        body: |
          ## 自动编译发布

          - 源码分支：`${{ env.REPO_BRANCH }}`
          - 编译时间：${{ steps.release_info.outputs.date }}
          - 默认管理地址：`10.0.0.1`

          > 本次固件由 GitHub Actions 自动编译并发布，构建日志详见 Actions 页面。
        files: /tmp/firmware/*
        make_latest: true
        draft: false
        prerelease: false
